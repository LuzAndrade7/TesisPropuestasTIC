version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tesis_tic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__TesisTICConnection=Host=postgres;Port=5432;Database=tesis_tic_db;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend/tesis-tic-app
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    environment:
      - ANGULAR_CLI_ANALYTICS=ci
    volumes:
      - ./frontend/tesis-tic-app:/app
      - /app/node_modules

volumes:
  postgres_data:
