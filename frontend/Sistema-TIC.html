<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sistema TIC — EPN F_AA_233A</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');
:root{--navy:#0E2240;--navy2:#1a3a60;--gold:#F3BD46;--gold2:#d9a83c;--red:#E31D1A;--blue:#77A4DC;--w:#fff;--g50:#F7F8FA;--g100:#EAECF0;--g200:#D1D5DB;--g400:#9CA3AF;--g600:#6B7280;--g800:#1F2937;--obs-bg:#FFF8E1;--obs-b:#F59E0B;--obs-t:#92400E;--rej-bg:#FEF2F2;--rej-b:#FCA5A5;--rej-t:#991B1B;--grn-bg:#ECFDF5;--grn-b:#6EE7B7;--grn-t:#065F46}
*{box-sizing:border-box;margin:0;padding:0}html{font-size:14px}body{font-family:'Montserrat',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh}
.topbar{background:var(--navy);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.tb-brand{display:flex;align-items:center;gap:10px}.tb-bar{width:4px;height:24px;background:var(--gold);border-radius:2px}
.tb-title{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff}
.tb-sub{font-size:9px;font-weight:600;color:var(--blue);letter-spacing:.07em;text-transform:uppercase;margin-top:1px}
.tb-right{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer}
.tb-user{font-size:11px;color:rgba(255,255,255,.7);font-weight:500}
.screen{display:none;padding:20px 14px;min-height:calc(100vh - 52px)}.screen.active{display:block}
.wrap{max-width:940px;margin:0 auto}.wrap-sm{max-width:640px;margin:0 auto}
.card{background:var(--w);border:1px solid var(--g100);border-radius:12px;padding:22px 24px}
.ph{text-align:center;margin-bottom:18px}.ph-bar{width:28px;height:3px;background:var(--gold);border-radius:2px;margin:0 auto 8px}.ph-title{font-size:17px;font-weight:700;color:var(--navy)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:8px;border:2px solid var(--g200);background:var(--w);font-size:12px;font-weight:600;cursor:pointer;color:var(--g800);font-family:'Montserrat',sans-serif;transition:all .15s;line-height:1;white-space:nowrap}
.btn:hover{background:var(--g100);border-color:var(--g400)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}.btn-primary:hover{background:var(--navy2);color:#fff;border-color:var(--navy2)}
.btn-gold{background:var(--gold);color:var(--navy);border-color:#b8891a;font-weight:700}.btn-gold:hover{background:var(--gold2)}
.btn-danger{background:var(--red);color:#fff;border-color:#a01513}.btn-danger:hover{background:#c0140f;color:#fff}
.btn-blue{background:var(--blue);color:#fff;border-color:#5580b0}.btn-blue:hover{background:#5580b0;color:#fff}
.btn-sm{padding:5px 11px;font-size:11px}
.form-actions{display:flex;gap:8px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.ibtn{background:transparent;border:none;cursor:pointer;padding:5px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;transition:all .12s;color:var(--g400)}
.ibtn:hover{background:var(--g100);color:var(--navy)}.ibtn.del:hover{background:#FEF2F2;color:var(--red)}.ibtn.ok:hover{background:var(--grn-bg);color:var(--grn-t)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b-borrador{background:#F1F3F5;color:#444;border:1px solid var(--g200)}.b-borrador::before{background:var(--g400)}
.b-pendiente{background:#EBF3FC;color:#0E4A8C;border:1px solid var(--blue)}.b-pendiente::before{background:var(--blue)}
.b-observada{background:#FEF9EC;color:#8B5E00;border:1px solid var(--gold)}.b-observada::before{background:var(--gold)}
.b-aprobada{background:var(--grn-bg);color:var(--grn-t);border:1px solid var(--grn-b)}.b-aprobada::before{background:#10B981}
.b-rechazada{background:var(--rej-bg);color:var(--rej-t);border:1px solid var(--rej-b)}.b-rechazada::before{background:var(--red)}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:18px}
.stat-btn{background:var(--w);border:2px solid var(--g100);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Montserrat',sans-serif}
.stat-btn:hover{border-color:var(--navy);background:#eef3fb}.stat-btn.active{background:#eef3fb}
.stat-num{font-size:20px;font-weight:700;line-height:1}.stat-lbl{font-size:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
.dtable{width:100%;border-collapse:collapse;font-size:12px}
.dtable thead tr{background:var(--navy)}.dtable th{padding:10px 12px;font-weight:700;font-size:10px;color:#fff;letter-spacing:.06em;text-transform:uppercase;text-align:left}
.dtable td{padding:10px 12px;border-bottom:1px solid var(--g100);vertical-align:middle}.dtable tbody tr:hover{background:#eef3fb}.dtable tbody tr:last-child td{border-bottom:none}
.sl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--navy);text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:7px}
.sl::before{content:'';display:block;width:3px;height:13px;background:var(--gold);border-radius:2px;flex-shrink:0}
.frow{display:flex;align-items:flex-start;gap:12px;margin-bottom:9px}
.fl{font-size:11px;font-weight:600;color:var(--g600);min-width:120px;padding-top:8px;flex-shrink:0}
.req{color:var(--red);margin-left:2px;font-weight:700}
.fv{font-size:11px;color:var(--g800);padding:8px 10px;background:var(--g50);border-radius:7px;border:1.5px solid var(--g200);flex:1;font-family:'Montserrat',sans-serif;width:100%;outline:none;transition:border-color .12s}
.fv:focus{border-color:var(--navy);background:#fff}.fv.invalid{border-color:var(--red)!important;background:#FEF2F2!important}
.ro{padding:8px 10px;background:var(--g50);border-radius:7px;border:1.5px solid var(--g100);font-size:11px;color:var(--g800);flex:1;min-height:36px;line-height:1.6}
.banner{padding:11px 14px;border-radius:8px;margin-bottom:14px;display:flex;align-items:flex-start;gap:9px}
.ban-obs{background:var(--obs-bg);border:1.5px solid var(--obs-b)}.ban-rej{background:var(--rej-bg);border:1.5px solid var(--rej-b)}
.ban-ok{background:var(--grn-bg);border:1.5px solid var(--grn-b)}.ban-info{background:#EBF3FC;border:1.5px solid var(--blue)}
.ban-title{font-size:11px;font-weight:700;margin-bottom:2px}.ban-txt{font-size:11px}
.ban-obs .ban-title,.ban-obs .ban-txt{color:var(--obs-t)}.ban-rej .ban-title,.ban-rej .ban-txt{color:var(--rej-t)}
.ban-ok .ban-title,.ban-ok .ban-txt{color:var(--grn-t)}.ban-info .ban-title,.ban-info .ban-txt{color:#0E4A8C}
.obs-box{background:var(--obs-bg);border:1.5px solid var(--obs-b);border-radius:8px;padding:10px 13px;margin-top:7px}
.obs-hdr{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.obs-ttl{font-size:10px;font-weight:700;color:var(--obs-t);text-transform:uppercase;letter-spacing:.05em}
.obs-meta{font-size:9px;color:var(--obs-t);opacity:.7;margin-left:auto}.obs-txt{font-size:11px;color:var(--obs-t);line-height:1.6}
.modal-overlay{position:fixed;inset:0;background:rgba(14,34,64,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(2px)}
.modal-card{background:var(--w);border-radius:16px;padding:36px 32px;max-width:440px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-icon{margin-bottom:14px}.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--g600);margin-bottom:24px;line-height:1.6}.modal-name{font-size:13px;font-weight:600;color:var(--g800);margin-bottom:8px}
.modal-acts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.dtab{width:100%;border-collapse:collapse;margin-bottom:14px;border:1.5px solid var(--g200);border-radius:8px;overflow:hidden}
.dtab td{padding:7px 11px;border-bottom:1px solid var(--g100);font-size:11px}.dtab .dlbl{font-weight:700;width:165px;background:var(--g50)}.dtab tr:last-child td{border-bottom:none}
.chip{background:var(--navy);color:#fff;border-radius:5px;padding:5px 12px;font-size:10px;font-weight:600;display:inline-block}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;border-left:4px solid var(--gold);white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- MODAL OVERLAY -->
<div id="modal-overlay" class="modal-overlay" style="display:none;">
  <div class="modal-card" id="modal-card"></div>
</div>

<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<nav class="topbar">
  <div class="tb-brand">
    <div class="tb-bar"></div>
    <div>
      <div class="tb-title">Facultad de Ingeniería de Sistemas — EPN</div>
      <div class="tb-sub" id="tb-sub">Sistema TIC</div>
    </div>
  </div>
  <div class="tb-right">
    <span class="tb-user">Ing. Ana López, PhD.</span>
    <div class="avatar" onclick="goTo('dashboard')" title="Tablero">INA</div>
  </div>
</nav>

<!-- ===== DASHBOARD ===== -->
<div class="screen active" id="screen-dashboard">
<div class="wrap">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;">
    <div>
      <div style="font-size:19px;font-weight:700;color:var(--navy);">Mis propuestas</div>
      <div style="font-size:10px;color:var(--g600);margin-top:2px;">Formulario F_AA_233A — Trabajo de Integración Curricular</div>
    </div>
    <button class="btn btn-gold" onclick="goTo('form')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nueva propuesta
    </button>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <div class="card" style="padding:0;overflow:hidden;">
    <table class="dtable">
      <thead><tr>
        <th style="width:38px;">N°</th><th>Título del proyecto</th>
        <th style="width:175px;">Estado</th>
        <th style="width:108px;">Actualización</th>
        <th style="width:120px;text-align:center;">Acciones</th>
      </tr></thead>
      <tbody id="dashboard-tbody"></tbody>
    </table>
  </div>
</div>
</div>

<script>
const API = 'http://localhost:5000/api';
var proposals = [];
var STATES = ['Todos','Borrador','Pendiente','Observada','Aprobada','Rechazada'];
var SCOLS = {Todos:'#0E2240',Borrador:'#9CA3AF',Pendiente:'#77A4DC',Observada:'#F3BD46',Aprobada:'#10B981',Rechazada:'#E31D1A'};
var activeFilter = 'Todos';

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

function showModal(iconHTML, title, nameStr, bodyStr, btnsHTML){
  var card=document.getElementById('modal-card');
  card.innerHTML=
    '<div class="modal-icon">'+iconHTML+'</div>'
    +'<div class="modal-title">'+title+'</div>'
    +(nameStr?'<div class="modal-name">'+nameStr+'</div>':'')
    +'<div class="modal-sub">'+bodyStr+'</div>'
    +'<div class="modal-acts">'+btnsHTML+'</div>';
  document.getElementById('modal-overlay').style.display='flex';
}

function closeModal(){
  document.getElementById('modal-overlay').style.display='none';
}

function goTo(screen){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-'+screen).classList.add('active');
  window.scrollTo(0,0);
  var subs={dashboard:'Dashboard docente'};
  document.getElementById('tb-sub').textContent=subs[screen]||screen;
  if(screen==='dashboard') renderDashboard();
}

function badgeHTML(e){
  var m={'Borrador':'b-borrador','Pendiente':'b-pendiente','Observada':'b-observada','Aprobada':'b-aprobada','Rechazada':'b-rechazada'};
  return'<span class="badge '+(m[e]||'b-borrador')+'">'+e+'</span>';
}

function esc(s){
  return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadProposals(){
  fetch(API+'/propuestas')
    .then(r=>r.json())
    .then(data=>{
      proposals = data || [];
      renderDashboard();
    })
    .catch(err=>{
      console.error('Error cargando propuestas:', err);
      toast('Error al cargar propuestas');
    });
}

function renderDashboard(){
  var ct={};
  STATES.forEach(function(s){
    ct[s]=s==='Todos'?proposals.length:proposals.filter(function(p){return p.estado===s;}).length;
  });
  
  document.getElementById('stats-row').innerHTML=STATES.map(function(s){
    var active=activeFilter===s;
    return'<div class="stat-btn'+(active?' active':'')+'" style="'+(active?'border-color:'+SCOLS[s]+';':'')+'" onclick="setFilter(\''+s+'\')">'
      +'<div class="stat-num" style="color:'+SCOLS[s]+';">'+ct[s]+'</div>'
      +'<div class="stat-lbl" style="color:'+SCOLS[s]+';">'+s+'</div></div>';
  }).join('');

  var filtered=activeFilter==='Todos'?proposals:proposals.filter(function(p){return p.estado===activeFilter;});
  var tbody=document.getElementById('dashboard-tbody');
  if(!filtered.length){
    tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:22px;color:var(--g400);font-size:12px;">No hay propuestas con estado "'+activeFilter+'"</td></tr>';
    return;
  }

  tbody.innerHTML=filtered.map(function(p,i){
    var ec=badgeHTML(p.estado);
    var ac='<button class="ibtn" onclick="verDetalle('+p.id+')" title="Ver"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>';
    if(p.estado==='Borrador') ac+='<button class="ibtn del" onclick="confirmDelete('+p.id+')" title="Eliminar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>';
    return'<tr><td style="font-size:10px;font-weight:600;color:#9CA3AF;">'+(i+1)+'</td><td style="font-weight:600;font-size:12px;">'+p.titulo+'</td><td>'+ec+'</td><td style="font-size:10px;color:var(--g600);font-weight:500;">'+p.fechaCreacion+'</td><td style="text-align:center;">'+ac+'</td></tr>';
  }).join('');
}

function setFilter(f){
  activeFilter=f;
  renderDashboard();
}

function confirmDelete(id){
  var p=proposals.find(x=>x.id===id);
  showModal(
    '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#E31D1A" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>',
    'Eliminar propuesta',
    '"'+p.titulo+'"',
    'Esta acción es permanente y no se puede deshacer. ¿Está seguro de que desea eliminar esta propuesta?',
    '<button class="btn btn-danger" style="padding:11px 24px;font-size:13px;" onclick="doDelete('+id+')">Sí, eliminar definitivamente</button>'
    +'<button class="btn" style="padding:11px 24px;font-size:13px;" onclick="closeModal()">Cancelar</button>'
  );
}

function doDelete(id){
  fetch(API+'/propuestas/'+id, {method:'DELETE'})
    .then(()=>{
      loadProposals();
      closeModal();
      toast('Propuesta eliminada');
    })
    .catch(err=>{
      console.error(err);
      toast('Error al eliminar');
    });
}

function verDetalle(id){
  alert('Detalle de propuesta '+id+' (próximamente)');
}

// Initialize
loadProposals();
</script>

</body>
</html>
