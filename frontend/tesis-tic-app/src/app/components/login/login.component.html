<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg width="72" height="72" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="10" width="180" height="180" rx="8" fill="#0E2240"/>
        <rect x="10" y="10" width="90" height="90" rx="4" fill="#C41E3A"/>
        <circle cx="55" cy="50" r="25" fill="none" stroke="#F3BD46" stroke-width="3"/>
        <ellipse cx="55" cy="50" rx="12" ry="25" fill="none" stroke="#F3BD46" stroke-width="2"/>
        <line x1="30" y1="50" x2="80" y2="50" stroke="#F3BD46" stroke-width="2"/>
        <line x1="33" y1="38" x2="77" y2="38" stroke="#F3BD46" stroke-width="1.5"/>
        <line x1="33" y1="62" x2="77" y2="62" stroke="#F3BD46" stroke-width="1.5"/>
        <rect x="100" y="10" width="90" height="90" rx="4" fill="#1a3a6e"/>
        <circle cx="145" cy="55" r="22" fill="#F3BD46"/>
        <circle cx="145" cy="55" r="12" fill="#1a3a6e"/>
        <circle cx="145" cy="55" r="5" fill="#F3BD46"/>
        <rect x="142" y="28" width="6" height="10" rx="2" fill="#F3BD46"/>
        <rect x="142" y="72" width="6" height="10" rx="2" fill="#F3BD46"/>
        <rect x="118" y="52" width="10" height="6" rx="2" fill="#F3BD46"/>
        <rect x="162" y="52" width="10" height="6" rx="2" fill="#F3BD46"/>
        <rect x="10" y="100" width="180" height="80" rx="4" fill="#2a4a8e"/>
        <rect x="60" y="115" width="80" height="55" rx="3" fill="#EDE0C4"/>
        <rect x="95" y="115" width="4" height="55" fill="#C8A96E"/>
        <line x1="70" y1="130" x2="90" y2="130" stroke="#C8A96E" stroke-width="2"/>
        <line x1="70" y1="140" x2="90" y2="140" stroke="#C8A96E" stroke-width="1.5"/>
        <line x1="105" y1="130" x2="130" y2="130" stroke="#C8A96E" stroke-width="2"/>
        <line x1="105" y1="140" x2="130" y2="140" stroke="#C8A96E" stroke-width="1.5"/>
        <path d="M20 180 Q100 195 180 180 L175 188 Q100 205 25 188 Z" fill="#0E2240"/>
        <text x="100" y="192" text-anchor="middle" font-size="7" font-weight="700" fill="#F3BD46" font-family="Arial">E SCIENTIA HOMINIS SALUS</text>
      </svg>
    </div>
    <div class="login-title">Escuela Politécnica Nacional</div>
    <div class="login-sub">Sistema de Gestión de Propuestas TIC<br><span style="font-size:10px;color:#9CA3AF;">Facultad de Ingeniería de Sistemas</span></div>
    <div class="fg">
      <label>Correo institucional</label>
      <input type="email" [(ngModel)]="email" placeholder="Correo institucional"/>
    </div>
    <div class="fg">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="Contraseña"/>
    </div>
    <button class="btn btn-primary" [disabled]="isLoading" (click)="onLogin()" style="width:100%;margin-top:6px;font-size:13px;padding:12px;">
      <span *ngIf="!isLoading">Iniciar sesión</span>
      <span *ngIf="isLoading">Cargando...</span>
    </button>
    <div style="text-align:center;margin-top:14px;">
      <a href="#" style="font-size:11px;color:var(--blue);text-decoration:none;">¿Olvidó su contraseña?</a>
    </div>
    <div style="border-top:1px solid var(--g100);margin-top:16px;padding-top:14px;text-align:center;font-size:10px;color:var(--g400);">Conexión cifrada SSL/TLS — Acceso institucional</div>
  </div>
</div>
